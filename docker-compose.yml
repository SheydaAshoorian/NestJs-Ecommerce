version: '3.8'
services:
  db:
    image: postgres:15
    container_name: nest_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: Ecommerce
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

# سرویس ردیس (Redis)
  redis:
    image: redis:7-alpine
    container_name: sales_redis
    restart: always
    ports:
      - '6379:6379'

volumes:
  postgres_data: